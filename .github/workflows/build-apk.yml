name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        run: |
          curl -sSLo /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug --stacktrace --no-build-cache --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: band7-tool-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
