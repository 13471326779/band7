name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd app
          curl -sS "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew" -o gradlew
          curl -sS "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-build-cache --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: band7-tool-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
