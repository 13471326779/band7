name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace --no-build-cache --no-configuration-cache -Dorg.gradle.daemon=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: band7-tool-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
