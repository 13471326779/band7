<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手环工具 - 智能手环UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--deep-blue:#0A2463;--ocean-blue:#1E5FAA;--sky-blue:#3A86FF;--light-blue:#E8F0FE;--medical-white:#F8FAFC;--glass-white:rgba(255,255,255,0.35);--glass-border:rgba(255,255,255,0.2);--text-primary:#0A2463;--text-secondary:#64748B;--heart-red:#FF3366;--green:#10B981;--orange:#F59E0B}
body{font-family:"Inter",-apple-system,"PingFang SC",sans-serif;background:linear-gradient(135deg,#0A2463 0%,#1E5FAA 50%,#3A86FF 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:40px 20px}
.phone-frame{width:390px;background:var(--medical-white);border-radius:44px;padding:20px;box-shadow:0 25px 60px rgba(10,36,99,0.3)}
.watch-viewport{width:100%;aspect-ratio:1/1;background:linear-gradient(170deg,#0C2D6B 0%,#0A2463 40%,#081C4A 100%);border-radius:32px;padding:24px;position:relative;overflow:hidden;box-shadow:inset 0 0 60px rgba(0,0,0,0.3),0 8px 32px rgba(10,36,99,0.2)}
.glass-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 50%,rgba(0,0,0,0.1) 100%);border-radius:32px;pointer-events:none;z-index:1}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;position:relative;z-index:2}
.time{font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);letter-spacing:0.5px}
.time-glass{background:var(--glass-white);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:20px;padding:4px 16px}
.battery-capsule{display:flex;align-items:center;gap:6px;background:var(--glass-white);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:20px;padding:4px 14px 4px 12px;font-size:11px;color:rgba(255,255,255,0.9);font-weight:500}
.battery-icon{width:22px;height:11px;border:1.5px solid rgba(255,255,255,0.6);border-radius:3px;position:relative;display:flex;align-items:center;padding:1.5px}
.battery-icon::after{content:"";position:absolute;right:-4px;top:2.5px;width:2px;height:4px;background:rgba(255,255,255,0.4);border-radius:0 1px 1px 0}
.battery-fill{height:100%;width:78%;background:var(--green);border-radius:1px}
.heart-section{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:20px 0 8px}
.heart-ring-container{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.heart-ring-svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
.heart-ring-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4;stroke-linecap:round}
.heart-ring-progress{fill:none;stroke:url(#heartGradient);stroke-width:4;stroke-linecap:round;stroke-dasharray:251.2;stroke-dashoffset:50.2;animation:pulse-ring 2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{stroke-dashoffset:50.2}50%{stroke-dashoffset:40.2}}
.heart-value{font-size:56px;font-weight:700;color:white;letter-spacing:-1px;line-height:1;position:relative;z-index:3}
.heart-unit{font-size:14px;font-weight:300;color:rgba(255,255,255,0.5);position:absolute;bottom:52px;right:42px;z-index:3}
.heart-label{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:13px;color:rgba(255,255,255,0.6);font-weight:400;z-index:3}
.heart-icon{display:inline-block;animation:heartbeat 1.2s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.2)}28%{transform:scale(1)}42%{transform:scale(1.15)}56%{transform:scale(1)}}
.step-mini{text-align:center;margin-top:8px;z-index:3;position:relative}
.step-number{font-size:22px;font-weight:600;color:white}
.step-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase}
.divider{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);margin:8px auto 12px;position:relative;z-index:2}
.grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 4px;position:relative;z-index:2}
.grid-item{background:var(--glass-white);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:18px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all 0.2s ease}
.grid-item:active{transform:scale(0.93);background:rgba(255,255,255,0.25)}
.grid-icon{font-size:28px;line-height:1}
.grid-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.7);letter-spacing:0.3px}
.bottom-dock{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.dock-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2)}
.dock-dot.active{width:20px;border-radius:3px;background:rgba(255,255,255,0.6)}
.app-content{padding:20px 8px 8px}
.app-title{font-size:20px;font-weight:700;color:var(--deep-blue);margin-bottom:4px}
.app-subtitle{font-size:13px;color:var(--text-secondary);font-weight:400;margin-bottom:16px}
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.feature-card{background:white;border:1px solid rgba(58,134,255,0.1);border-radius:16px;padding:16px;text-align:center;transition:all 0.2s ease;cursor:pointer}
.feature-card:hover{border-color:var(--sky-blue);box-shadow:0 4px 20px rgba(58,134,255,0.15);transform:translateY(-2px)}
.feature-icon{font-size:28px;margin-bottom:8px}
.feature-name{font-size:13px;font-weight:600;color:var(--deep-blue)}
.feature-desc{font-size:11px;color:var(--text-secondary);margin-top:2px}
.status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--green);margin-bottom:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
